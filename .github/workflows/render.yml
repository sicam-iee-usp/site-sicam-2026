name: Renderizar e publicar o site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Garante que apenas uma renderização rode por vez, cancelando execuções antigas
concurrency:
  group: "render-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar o Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar o R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar pacotes de R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown

      - name: Renderizar o site com o Quarto
        run: quarto render

      - name: Garantir o arquivo CNAME (domínio sicam.com.br)
        run: echo "sicam.com.br" > docs/CNAME

      - name: Commitar o site renderizado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Renderizar o site automaticamente [skip ci]"
          file_pattern: "docs/ _freeze/"
